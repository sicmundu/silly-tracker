name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and build number from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          if [[ "$TAG" == *-* ]]; then
            VERSION="${TAG%-*}"
            BUILD="${TAG##*-}"
          else
            VERSION="$TAG"
            BUILD=$(git tag -l 'v*' | wc -l | tr -d ' ')
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "BUILD=$BUILD" >> $GITHUB_OUTPUT

      - name: Resolve Sparkle package
        run: |
          xcodebuild -project WorkTracker.xcodeproj \
            -scheme WorkTracker \
            -resolvePackageDependencies \
            -derivedDataPath .build/xcode

      - name: Build Release
        run: |
          xcodebuild -project WorkTracker.xcodeproj \
            -scheme WorkTracker \
            -configuration Release \
            -derivedDataPath .build/xcode \
            MARKETING_VERSION="${{ steps.version.outputs.VERSION }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.BUILD }}" \
            build

      - name: Create ZIP
        run: |
          mkdir -p .build/release
          ditto -c -k --keepParent \
            .build/xcode/Build/Products/Release/SillyTrack.app \
            .build/release/SillyTrack-${{ steps.version.outputs.VERSION }}.zip

      - name: Sign and generate appcast entry
        id: sign
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          SPARKLE_BIN=".build/xcode/SourcePackages/artifacts/sparkle/Sparkle/bin"
          ZIP=".build/release/SillyTrack-${{ steps.version.outputs.VERSION }}.zip"
          VERSION="${{ steps.version.outputs.VERSION }}"
          BUILD="${{ steps.version.outputs.BUILD }}"

          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          SIGNATURE=$("$SPARKLE_BIN/sign_update" "$ZIP" --ed-key-file /tmp/sparkle_key 2>&1)
          rm -f /tmp/sparkle_key

          ED_SIG=$(echo "$SIGNATURE" | grep -o 'sparkle:edSignature="[^"]*"' | cut -d'"' -f2)
          LENGTH=$(stat -f%z "$ZIP")
          PUB_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S %z")
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/SillyTrack-${VERSION}.zip"

          python3 -c "
          print('''        <item>
              <title>Version ${VERSION}</title>
              <pubDate>${PUB_DATE}</pubDate>
              <sparkle:version>${BUILD}</sparkle:version>
              <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
              <sparkle:minimumSystemVersion>13.0</sparkle:minimumSystemVersion>
              <enclosure
                  url=\"${DOWNLOAD_URL}\"
                  length=\"${LENGTH}\"
                  type=\"application/octet-stream\"
                  sparkle:edSignature=\"${ED_SIG}\"
              />
          </item>''')" > .build/release/appcast_item.xml

      - name: Update appcast.xml
        run: |
          python3 -c "
          with open('appcast.xml') as f:
              content = f.read()
          with open('.build/release/appcast_item.xml') as f:
              item = f.read()
          content = content.replace('    </channel>', item + '\n    </channel>')
          with open('appcast.xml', 'w') as f:
              f.write(content)
          "

      - name: Commit updated appcast
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: update appcast for v${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          gh release create "v${VERSION}" \
            ".build/release/SillyTrack-${VERSION}.zip" \
            --title "v${VERSION}" \
            --generate-notes
